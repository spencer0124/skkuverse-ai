services:
  ai:
    build: .
    ports:
      - "127.0.0.1:4000:4000"
    env_file:
      - .env
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    networks:
      - skkuverse
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

networks:
  skkuverse:
    external: true
